<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giro da Sorte - Oficial</title>
    
    <link rel="icon" type="image/png" href="girobeijo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            border-radius: 50%;
            z-index: -1;
            top: 20%;
            left: 10%;
            opacity: 0.3;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mascote {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .tagline {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .btn-main {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .link-item {
            padding: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="girobeijo.png" alt="Mascote Giro de Sorte" class="mascote">
        
        <div class="logo">Giro da Sorte</div>
        <p class="tagline">Sua sorte em um giro. Prático, rápido e moderno.</p>

        <a href="https://play.google.com/store/apps/details?id=fel.apps.girodasorte" target="_blank" class="btn-main">Baixar na Google Play</a>

        <div class="links-grid">
            <a href="privacidade.html" class="link-item">Privacidade</a>
            <a href="termos.html" class="link-item">Termos de Uso</a>
        </div>

        <footer>
            &copy; 2026 Fel.Apps - Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
